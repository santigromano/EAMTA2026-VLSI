#--------------------------------------------------------------
# CACE circuit characterization file
#--------------------------------------------------------------

name:           count4bits_2c
description:    4-bit synchronous binary counter integrating four single-bit counter stages with two-phase clock
PDK:            ihp-sg13g2

cace_format:    5.2

authorship:
  designer:         EAMTA 2026
  creation_date:    March 2026
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        schematic
  magic:            layout
  netlist:          netlist
  documentation:    ../../../docs

pins:
  CLK1:
    description: Clock phase 1 (positive phase)
    type: digital
    direction: input
    Vmin: vss - 0.3
    Vmax: vdd + 0.3
  CLK2:
    description: Clock phase 2 (negative phase, complement of CLK1)
    type: digital
    direction: input
    Vmin: vss - 0.3
    Vmax: vdd + 0.3
  CLR:
    description: Synchronous active-high reset
    type: digital
    direction: input
    Vmin: vss - 0.3
    Vmax: vdd + 0.3
  CE:
    description: Count enable
    type: digital
    direction: input
    Vmin: vss - 0.3
    Vmax: vdd + 0.3
  "00":
    description: Counter output bit 0 (LSB)
    type: digital
    direction: output
    Vmin: vss
    Vmax: vdd
  "01":
    description: Counter output bit 1
    type: digital
    direction: output
    Vmin: vss
    Vmax: vdd
  "10":
    description: Counter output bit 2
    type: digital
    direction: output
    Vmin: vss
    Vmax: vdd
  "11":
    description: Counter output bit 3 (MSB)
    type: digital
    direction: output
    Vmin: vss
    Vmax: vdd
  vdd:
    description: Digital power supply
    type: power
    direction: inout
    Vmin: 1.08
    Vmax: 1.32
  vss:
    description: Digital ground
    type: ground
    direction: inout
    Vmin: -0.3
    Vmax: 0.3

default_conditions:
  vdd:
    description: Supply voltage
    display: VDD
    unit: V
    typical: 1.2
  temperature:
    description: Ambient temperature
    display: Temp
    unit: °C
    minimum: -40
    typical: 27
    maximum: 130
  corner:
    description: Process corner
    display: Corner
    minimum: ss
    typical: tt
    maximum: ff

parameters:
  fmax:
    description: Maximum operating clock frequency
    display: fmax
    unit: MHz
    spec:
      result:
        minimum:
          value: 10
          fail: true
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: templates/fmax.sch
        format: ascii
        suffix: .data
        variables: [null, result]
    conditions:
      corner:
        minimum: ss
        typical: tt
        maximum: ff
      temperature:
        minimum: -40
        typical: 27
        maximum: 130

  counting_sequence:
    description: Verify counter increments correctly from 0 to 15 and wraps to 0
    display: Counting sequence
    status: skip
    tool:
      ngspice:
        template: templates/count_seq.sch
        format: ascii
        suffix: .data
        variables: [time, Q0, Q1, Q2, Q3]
    plot:
      count_seq:
        xaxis: time
        yaxis: [Q0, Q1, Q2, Q3]
    variables:
      time:
        display: Time
        unit: ns
      Q0:
        display: Q[0]
        unit: V
      Q1:
        display: Q[1]
        unit: V
      Q2:
        display: Q[2]
        unit: V
      Q3:
        display: Q[3]
        unit: V
    conditions:
      corner:
        typical: tt
      temperature:
        typical: 27

  Idd_dynamic:
    description: Dynamic supply current at 10 MHz
    display: Idd @ 10 MHz
    unit: µA
    spec:
      result:
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: 100
          fail: true
    tool:
      ngspice:
        template: templates/idd.sch
        format: ascii
        suffix: .data
        variables: [null, result]
    conditions:
      frequency:
        display: Clock frequency
        unit: MHz
        typical: 10
      corner:
        typical: tt
      temperature:
        typical: 27

  magic_area:
    spec:
      area:
        display: Area
        description: Total circuit layout area
        unit: µm²
        maximum:
          value: any
      width:
        display: Width
        description: Total circuit layout width
        unit: µm
        maximum:
          value: any
      height:
        display: Height
        description: Total circuit layout height
        unit: µm
        maximum:
          value: any
    tool:
      magic_area

  magic_drc:
    description: Magic DRC
    display: Magic DRC
    spec:
      drc_errors:
        maximum:
          value: 0
    tool:
      magic_drc

  netgen_lvs:
    description: Netgen LVS
    display: Netgen LVS
    spec:
      lvs_errors:
        maximum:
          value: 0
    tool:
      netgen_lvs
