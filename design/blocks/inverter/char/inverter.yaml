#--------------------------------------------------------------
# CACE circuit characterization file
#--------------------------------------------------------------

name:           inverter
description:    CMOS inverter implementing Y = NOT(in)
PDK:            ihp-sg13g2

cace_format:    5.2

authorship:
  designer:         EAMTA 2026
  creation_date:    March 2026
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        schematic
  magic:            layout
  netlist:          netlist
  documentation:    ../../../docs

pins:
  in:
    description: Data input
    type: digital
    direction: input
    Vmin: vss - 0.3
    Vmax: vdd + 0.3
  out:
    description: Inverted output
    type: digital
    direction: output
    Vmin: vss
    Vmax: vdd
  vdd:
    description: Digital power supply
    type: power
    direction: inout
    Vmin: 1.08
    Vmax: 1.32
  vss:
    description: Digital ground
    type: ground
    direction: inout
    Vmin: -0.3
    Vmax: 0.3

default_conditions:
  vdd:
    description: Supply voltage
    display: VDD
    unit: V
    typical: 1.2
  temperature:
    description: Ambient temperature
    display: Temp
    unit: °C
    minimum: -40
    typical: 27
    maximum: 130
  corner:
    description: Process corner
    display: Corner
    minimum: ss
    typical: tt
    maximum: ff

parameters:
  tpd_lh:
    description: Propagation delay, output low-to-high
    display: tpd (L→H)
    unit: ps
    spec:
      result:
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: 200
          fail: true
    tool:
      ngspice:
        template: templates/tpd.sch
        format: ascii
        suffix: .data
        variables: [null, result]
    conditions:
      corner:
        minimum: ss
        typical: tt
        maximum: ff
      temperature:
        minimum: -40
        typical: 27
        maximum: 130

  tpd_hl:
    description: Propagation delay, output high-to-low
    display: tpd (H→L)
    unit: ps
    spec:
      result:
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: 200
          fail: true
    tool:
      ngspice:
        template: templates/tpd.sch
        format: ascii
        suffix: .data
        variables: [null, result]
    conditions:
      corner:
        minimum: ss
        typical: tt
        maximum: ff
      temperature:
        minimum: -40
        typical: 27
        maximum: 130

  magic_area:
    spec:
      area:
        display: Area
        description: Total circuit layout area
        unit: µm²
        maximum:
          value: any
      width:
        display: Width
        description: Total circuit layout width
        unit: µm
        maximum:
          value: any
      height:
        display: Height
        description: Total circuit layout height
        unit: µm
        maximum:
          value: any
    tool:
      magic_area

  magic_drc:
    description: Magic DRC
    display: Magic DRC
    spec:
      drc_errors:
        maximum:
          value: 0
    tool:
      magic_drc

  netgen_lvs:
    description: Netgen LVS
    display: Netgen LVS
    spec:
      lvs_errors:
        maximum:
          value: 0
    tool:
      netgen_lvs
