#--------------------------------------------------------------
# CACE circuit characterization file
# Block: count4bits (4-bit counter top-level)
# PDK: IHP SG13G2
#--------------------------------------------------------------

name:           count4bits
description:    4-bit synchronous binary counter using IHP SG13G2 130nm PDK
PDK:            sg13g2

cace_format:    5.2

authorship:
  designer:         EAMTA 2026 Students
  organization:     EAMTA 2026 - VLSI Course
  creation_date:    March 2026
  license:          Apache 2.0

paths:
  root:             ..
  schematic:        schematic
  layout:           layout
  netlist:          schematic
  documentation:    .

pins:
  VDD:
    description: Positive power supply
    type: power
    direction: inout
    Vmin: 1.0
    Vmax: 1.4
  VSS:
    description: Ground
    type: ground
    direction: inout
  CLK:
    description: Clock input
    type: signal
    direction: input
  RST:
    description: Active-high synchronous reset
    type: signal
    direction: input
  Q0:
    description: Counter bit 0 (LSB)
    type: signal
    direction: output
  Q1:
    description: Counter bit 1
    type: signal
    direction: output
  Q2:
    description: Counter bit 2
    type: signal
    direction: output
  Q3:
    description: Counter bit 3 (MSB)
    type: signal
    direction: output

default_conditions:
  vdd:
    description: Positive supply voltage
    display: VDD
    unit: V
    typical: 1.2
  temperature:
    description: Ambient temperature
    display: Temp
    unit: °C
    minimum: -40
    typical: 27
    maximum: 125
  corner:
    description: Process corner
    display: Corner
    typical: tt

parameters:
  max_freq:
    description: Maximum operating frequency
    display: fmax
    unit: Hz
    spec:
      minimum:
        value: 10e6
      typical:
        value: any
      maximum:
        value: any
    conditions:
      vdd:
        minimum: 1.08
        typical: 1.2
        maximum: 1.32
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  tpd_clk_q:
    description: Clock to Q propagation delay
    display: tclk2q
    unit: s
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 500e-12
    conditions:
      vdd:
        typical: 1.2
      corner:
        enumerate: [ss, tt, ff]
      temperature:
        minimum: -40
        typical: 27
        maximum: 125

  power_static:
    description: Static power consumption
    display: Pstatic
    unit: W
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 1e-6
    conditions:
      vdd:
        typical: 1.2
      corner:
        typical: tt
      temperature:
        typical: 27

  power_dynamic:
    description: Dynamic power consumption at 10MHz
    display: Pdyn_10MHz
    unit: W
    spec:
      minimum:
        value: any
      typical:
        value: any
      maximum:
        value: 100e-6
    conditions:
      vdd:
        typical: 1.2
      corner:
        typical: tt
      temperature:
        typical: 27
